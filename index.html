<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Modelist · Custom Model Portfolios for Financial Advisors</title>
<style>
:root{
  --navy:#0C4160;--navy-dark:#082d42;--navy-deep:#051d2a;
  --terra:#B4654A;--terra-dark:#8f4e39;--terra-lt:#c78770;
  --slate:#68869A;--slate-lt:#8fa5b4;--slate-dk:#4a6a7e;
  --soft-black:#1A1A1A;--black:#000000;
  --warm-gray:#DAD9D6;--blue-gray:#D7E0EB;--blue-gray-lt:#e8eef4;
  --bg:#FFFFFF;--bg-subtle:#FAFAF8;--bg-panel:#F5F3EF;
  --text:#1A1A1A;--text-muted:#5a6670;--text-faint:#8a939b;
  --border:#E7E5E0;--border-strong:#C8C5BD;--rule:#EDEBE6;
  --eq-color:#0C4160;--fi-color:#8f6f55;--alt-color:#3D6B5E;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text);background:var(--bg);line-height:1.55;font-size:14.5px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:'cv02','cv03','cv11','ss01'}
h1,h2,h3,h4,h5{color:var(--soft-black);font-weight:700;letter-spacing:-.015em;line-height:1.2}
h1{font-size:46px;font-weight:800;letter-spacing:-.028em}
h2{font-size:30px;font-weight:800;letter-spacing:-.02em}
h3{font-size:19px;font-weight:700}
h4{font-size:14.5px;font-weight:600}
p{color:var(--text)}
a{color:var(--navy);text-decoration:none}
a:hover{color:var(--terra)}
.display{font-weight:900;letter-spacing:.06em;text-transform:uppercase}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--slate)}
.eyebrow-terra{color:var(--terra)}
.rule{height:1px;background:var(--rule);border:0;margin:24px 0}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}

/* App layout */
.app{display:grid;grid-template-columns:276px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--soft-black);color:#fff;padding:30px 26px 22px;display:flex;flex-direction:column;overflow-y:auto;z-index:10}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:#3a3a3a}
.brand-stack{padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:22px;display:flex;flex-direction:column;align-items:flex-start}
.brand-m{width:56px;height:auto;display:block;margin-bottom:12px}
.brand-wordmark-full{font-weight:900;letter-spacing:.22em;font-size:18px;color:#fff;line-height:1}
.brand-sub-stack{font-size:9px;color:var(--slate-lt);letter-spacing:.18em;text-transform:uppercase;margin-top:6px;font-weight:500}
.brand-usage{font-size:9.5px;color:var(--terra);margin-top:14px;letter-spacing:.2em;text-transform:uppercase;font-weight:700}
.sidebar-title{font-size:10px;color:var(--slate-lt);letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px;font-weight:600}
.nav{list-style:none;flex:1}
.nav-item{display:grid;grid-template-columns:24px 1fr;align-items:center;gap:10px;padding:10px 12px 10px 12px;margin-left:-14px;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;border-left:2px solid transparent;transition:color .16s,border-color .16s,background .16s;font-weight:500;user-select:none}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.03)}
.nav-item.active{color:#fff;border-left-color:var(--terra);background:rgba(180,101,74,.14)}
.nav-num{font-size:10px;color:var(--slate);font-weight:600;letter-spacing:.08em}
.nav-item.active .nav-num{color:var(--terra)}
.sidebar-foot{font-size:10px;color:var(--slate);letter-spacing:.12em;text-transform:uppercase;padding-top:18px;border-top:1px solid rgba(255,255,255,.08);line-height:1.6}
.sidebar-foot strong{color:rgba(255,255,255,.8);display:block;font-size:11px;margin-bottom:4px;letter-spacing:.14em}

/* Main content */
.main{min-width:0;background:var(--bg)}
.section{display:none;min-height:100vh;padding:68px 68px 96px;max-width:1280px;animation:fi .35s ease}
.section.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.section-head{margin-bottom:40px;padding-bottom:22px;border-bottom:1px solid var(--rule)}
.section-head .eyebrow{margin-bottom:12px;display:block}
.section-head .sub{color:var(--text-muted);font-size:16px;margin-top:14px;max-width:760px;line-height:1.55}

/* ---- Intro hero ---- */
.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:56px;align-items:start;margin-top:8px}
.hero-title{font-size:56px;line-height:1.05;letter-spacing:-.03em;font-weight:900;color:var(--soft-black);margin-bottom:20px}
.hero-title span{color:var(--terra)}
.hero-lead{font-size:17px;color:var(--text-muted);line-height:1.6;margin-bottom:28px;max-width:560px}
.hero-sublead{font-size:14px;color:var(--slate);letter-spacing:.02em;font-style:italic;font-weight:500;margin-top:-4px;margin-bottom:24px;max-width:560px}
.hero-bullets{list-style:none;margin:20px 0 0 0}
.hero-bullets li{padding:12px 0;border-top:1px solid var(--rule);display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start;font-size:14px;line-height:1.5}
.hero-bullets li:last-child{border-bottom:1px solid var(--rule)}
.hero-bullets li .num{font-size:11px;color:var(--terra);font-weight:700;letter-spacing:.08em;padding-top:3px}
.hero-bullets li strong{color:var(--soft-black);font-weight:700}

.hero-right-col{display:flex;flex-direction:column;gap:18px;position:sticky;top:40px}
.hero-right{background:var(--soft-black);color:#fff;padding:36px 34px;min-height:480px;display:flex;flex-direction:column;justify-content:space-between}
.hero-right .tag{font-size:10px;color:var(--terra);letter-spacing:.2em;text-transform:uppercase;font-weight:600;margin-bottom:18px}
.hero-right h3{color:#fff;font-size:24px;line-height:1.25;margin-bottom:18px;font-weight:700;letter-spacing:-.01em}
.hero-right p{color:rgba(255,255,255,.78);font-size:14px;line-height:1.65;margin-bottom:14px}
.hero-right .stat-block{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:22px;padding-top:22px;border-top:1px solid rgba(255,255,255,.1)}
.hero-right .st-n{font-size:28px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
.hero-right .st-l{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.14em;text-transform:uppercase;margin-top:8px;font-weight:600}
.hero-right .foot{margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);font-size:10px;color:var(--slate-lt);letter-spacing:.12em;text-transform:uppercase}
.hero-right .foot strong{color:#fff;display:block;font-size:11px;margin-bottom:4px;letter-spacing:.14em}
.li-follow-below{display:flex;align-items:center;gap:14px;padding:20px 26px;background:#fff;border:1px solid var(--border);color:var(--soft-black);font-size:13.5px;letter-spacing:.14em;font-weight:700;text-transform:uppercase;text-decoration:none;transition:all .22s;width:100%}
.li-follow-below:hover{background:var(--soft-black);border-color:var(--soft-black);color:#fff;transform:translateY(-1px);box-shadow:0 8px 20px -10px rgba(0,0,0,.25)}
.li-follow-below svg{width:22px;height:22px;flex-shrink:0;color:#0A66C2;transition:color .22s}
.li-follow-below:hover svg{color:#fff}
.li-follow-below span:first-of-type{flex:1}
.li-follow-below .arrow{font-size:18px;font-weight:400;letter-spacing:0;transition:transform .22s}
.li-follow-below:hover .arrow{transform:translateX(3px)}

.t-name-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:2px}
.t-li{color:var(--slate);display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:1px solid var(--border);border-radius:2px;transition:all .18s;flex-shrink:0;margin-top:2px}
.t-li svg{width:14px;height:14px;display:block}
.t-li:hover{color:#fff;background:#0A66C2;border-color:#0A66C2}

/* ---- Why Modelist (four edges) ---- */
.edges-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.edge-card{background:#fff;border:1px solid var(--border);padding:28px 30px;position:relative;overflow:hidden;transition:border-color .18s,transform .18s}
.edge-card:hover{border-color:var(--navy);transform:translateY(-1px)}
.edge-card::before{content:"";position:absolute;top:0;left:0;width:3px;height:56px;background:var(--terra)}
.edge-card .ix{font-size:11px;color:var(--terra);font-weight:700;letter-spacing:.18em;margin-bottom:12px}
.edge-card h3{font-size:21px;margin-bottom:12px;color:var(--navy);letter-spacing:-.015em}
.edge-card p{font-size:13.5px;line-height:1.6;color:var(--text-muted);margin-bottom:14px}
.edge-card ul{list-style:none;margin-top:10px}
.edge-card ul li{padding:6px 0;font-size:13px;color:var(--text);display:grid;grid-template-columns:14px 1fr;gap:10px;align-items:baseline;line-height:1.5}
.edge-card ul li::before{content:"+";color:var(--terra);font-weight:700}

/* ---- Transferable Value Matrix ---- */
.tvm-intro{background:var(--bg-panel);border-left:3px solid var(--terra);padding:24px 30px;margin-bottom:36px}
.tvm-intro p{font-size:15px;line-height:1.65;color:var(--text);max-width:820px}
.tvm-intro strong{color:var(--navy);font-weight:700}
.tvm-frame{background:var(--soft-black);padding:56px 72px;position:relative;color:#fff;overflow:hidden}
.tvm-title{font-size:11px;color:var(--terra);letter-spacing:.22em;text-transform:uppercase;font-weight:700;margin-bottom:36px;text-align:center}
.tvm-grid{display:grid;grid-template-columns:56px 1fr 1fr;grid-template-rows:1fr 1fr 56px;gap:0;width:100%;max-width:900px;margin:0 auto;position:relative}
.tvm-cell{padding:26px 28px;border:1px solid rgba(255,255,255,.09);min-height:180px;display:flex;flex-direction:column;justify-content:space-between;background:rgba(255,255,255,.02);transition:background .2s}
.tvm-cell.tvm-hero{background:linear-gradient(135deg,rgba(180,101,74,.22) 0%,rgba(180,101,74,.08) 100%);border:1px solid rgba(180,101,74,.45)}
.tvm-cell .tvm-head{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.015em;line-height:1.15;margin-bottom:12px}
.tvm-cell.tvm-hero .tvm-head{color:#ffbda2}
.tvm-cell .tvm-bullets{list-style:none;margin-top:0;margin-bottom:14px}
.tvm-cell .tvm-bullets li{font-size:11.5px;color:rgba(255,255,255,.75);padding:3px 0;letter-spacing:.01em;line-height:1.5}
.tvm-cell .tvm-bullets li::before{content:"·";margin-right:8px;color:var(--slate-lt)}
.tvm-cell .tvm-foot{font-size:11.5px;color:rgba(255,255,255,.6);line-height:1.55;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);font-style:italic}
.tvm-cell.tvm-hero .tvm-foot{color:#f0c8b2;font-style:normal;font-weight:600}
.tvm-y-axis{grid-row:1/3;grid-column:1;display:flex;flex-direction:column;justify-content:space-between;align-items:center;padding:4px 0;position:relative}
.tvm-y-axis .label{writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;color:var(--slate-lt);letter-spacing:.22em;text-transform:uppercase;font-weight:700}
.tvm-y-axis .sign{font-size:15px;color:var(--slate);font-weight:600}
.tvm-x-axis{grid-row:3;grid-column:2/4;display:flex;justify-content:space-between;align-items:center;padding:22px 0 0 0;position:relative}
.tvm-x-axis .label{font-size:10px;color:var(--slate-lt);letter-spacing:.22em;text-transform:uppercase;font-weight:700}
.tvm-x-axis .sign{font-size:15px;color:var(--slate);font-weight:600}
.tvm-mark{position:absolute;top:4px;right:-4px;font-size:10px;color:var(--terra);font-weight:700;letter-spacing:.16em;background:rgba(180,101,74,.18);padding:3px 9px;border:1px solid rgba(180,101,74,.45)}

/* ---- Process stepper ---- */
.stepper{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:36px}
.step-btn{background:#fff;border:1px solid var(--border);padding:18px 16px;cursor:pointer;text-align:left;transition:all .18s;position:relative}
.step-btn:hover{border-color:var(--navy);background:var(--bg-subtle)}
.step-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.step-btn .n{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--terra);margin-bottom:10px;font-variant-numeric:tabular-nums}
.step-btn.active .n{color:#ffc2a6}
.step-btn .t{font-size:13.5px;font-weight:700;line-height:1.25;color:var(--soft-black)}
.step-btn.active .t{color:#fff}
.step-panel{background:var(--bg-panel);border-left:3px solid var(--terra);padding:36px 40px;min-height:220px}
.step-panel h3{font-size:22px;margin-bottom:14px;color:var(--navy)}
.step-panel p{color:var(--text);font-size:15px;line-height:1.65;max-width:720px}
.step-panel .addtl{margin-top:26px;padding:20px 22px;background:#fff;border:1px solid var(--border)}
.step-panel .addtl .lbl{font-size:10px;color:var(--terra);font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-bottom:12px}
.step-panel .addtl ul{list-style:none;margin:0}
.step-panel .addtl li{padding:10px 0;border-top:1px solid var(--rule);font-size:13.5px;display:grid;grid-template-columns:20px 1fr;gap:12px;align-items:start}
.step-panel .addtl li:first-child{border-top:0}
.step-panel .addtl li .m{color:var(--terra);font-weight:700;font-size:12px}
.step-panel .addtl li strong{color:var(--navy);font-weight:600}

/* ---- Process flow infographic ---- */
.flow-section{margin-top:60px}
.flow-head{margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--rule)}
.flow-head .eyebrow{display:block;margin-bottom:10px}
.flow-head h3{font-size:22px;margin-bottom:10px;letter-spacing:-.015em;color:var(--soft-black)}
.flow-head .sub{color:var(--text-muted);font-size:14px;max-width:860px;line-height:1.6}
.flow-head .sub strong{color:var(--navy);font-weight:600}
.flow-grid{display:grid;grid-template-columns:minmax(0,1fr) 110px minmax(0,1fr) 120px minmax(0,1fr);gap:0;align-items:stretch}
.flow-stage{background:#fff;border:1px solid var(--border);padding:24px 22px;display:flex;flex-direction:column;min-height:340px;position:relative}
.flow-stage.mid{background:var(--bg-panel);border:1px solid var(--border-strong);border-left:3px solid var(--slate)}
.flow-stage.last{border-left:3px solid var(--navy)}
.flow-stage .stage-cap{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.flow-stage .stage-num{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--terra);font-variant-numeric:tabular-nums}
.flow-stage .stage-tag{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate);font-weight:600}
.flow-stage h4{font-size:18px;color:var(--navy);margin-bottom:8px;letter-spacing:-.01em}
.flow-stage .stage-lead{font-size:12.5px;color:var(--text-muted);line-height:1.5;margin-bottom:16px;min-height:38px}
.flow-stage .stage-list{list-style:none;margin:0;padding:0;border-top:1px solid var(--rule);flex:1}
.flow-stage .stage-list li{padding:7px 0;border-bottom:1px solid var(--rule);font-size:12.5px;display:flex;justify-content:space-between;align-items:center;line-height:1.3;font-variant-numeric:tabular-nums;gap:10px}
.flow-stage .stage-list li span{color:var(--soft-black);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flow-stage .stage-list li em{font-style:normal;color:var(--navy);font-weight:700;flex-shrink:0}
.flow-stage .stage-list li.more{color:var(--text-muted);font-size:11px;font-style:italic;justify-content:flex-start;padding-top:10px;border-bottom:0}
.flow-stage .stage-list li.more::before{content:"+";margin-right:6px;font-style:normal;color:var(--slate)}
.flow-stage .stage-tail{margin-top:14px;padding:10px 12px;background:rgba(104,134,154,.12);font-size:10px;letter-spacing:.1em;color:var(--slate-dk);font-weight:700;text-align:center;text-transform:uppercase;line-height:1.45}
.flow-connector{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px 10px;gap:12px}
.flow-connector .conn-lbl{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--slate);text-transform:uppercase;text-align:center;line-height:1.4}
.flow-connector .conn-lbl.terra{color:var(--terra)}
.flow-connector .conn-svg{width:100%;height:16px;display:block}
.flow-connector .conn-note{font-size:10px;color:var(--text-muted);text-align:center;line-height:1.5;max-width:110px;letter-spacing:.01em}
.flow-connector .conn-note strong{color:var(--terra);font-weight:700;white-space:nowrap}

/* ---- Strategies ---- */
.strat-lead{display:grid;grid-template-columns:1.2fr 1fr;gap:36px;margin-bottom:36px;align-items:center}
.strat-lead .big-num{font-size:120px;line-height:1;font-weight:900;letter-spacing:-.05em;color:var(--navy);font-variant-numeric:tabular-nums}
.strat-lead .big-num sub{font-size:28px;font-weight:700;letter-spacing:0;color:var(--terra);vertical-align:14px;margin-left:4px}
.strat-lead .big-lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--slate);font-weight:600;margin-top:8px}
.strat-lead p{font-size:15px;line-height:1.65;color:var(--text);margin-bottom:12px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:40px}
.cat-card{background:#fff;border:1px solid var(--border);padding:22px 24px}
.cat-card .cat-tag{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--terra);font-weight:700;margin-bottom:10px}
.cat-card h4{font-size:17px;color:var(--navy);margin-bottom:10px}
.cat-card p{font-size:13px;color:var(--text-muted);line-height:1.55;margin-bottom:12px}
.cat-card .ex{font-size:11.5px;color:var(--slate-dk);line-height:1.6}
.cat-card .ex em{font-style:normal;font-weight:600;color:var(--soft-black)}

.ex-strat-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ex-strat{background:var(--soft-black);color:#fff;padding:32px 34px;position:relative}
.ex-strat .badge{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--terra);font-weight:700;margin-bottom:14px}
.ex-strat h3{color:#fff;font-size:22px;margin-bottom:6px;letter-spacing:-.015em}
.ex-strat .tag{font-size:11px;color:var(--slate-lt);letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:22px}
.ex-strat .block{padding-top:16px;margin-top:16px;border-top:1px solid rgba(255,255,255,.12)}
.ex-strat .block .l{font-size:10px;color:var(--terra);letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.ex-strat .block p{color:rgba(255,255,255,.8);font-size:13px;line-height:1.65}
.ex-strat .block p strong{color:#fff;font-weight:600}

/* ---- Sample Models ---- */
.sa-header{display:flex;justify-content:space-between;align-items:center;padding:22px 30px;margin-bottom:28px;background:var(--soft-black);color:#fff;gap:24px;flex-wrap:wrap}
.sa-header .meta-left{display:flex;flex-direction:column;gap:6px}
.sa-header .meta-left .lbl{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--slate-lt);font-weight:600}
.sa-header .meta-left .nm{font-size:16px;color:#fff;font-weight:700;letter-spacing:.02em}
.sa-header .timeframe{font-size:10.5px;color:rgba(255,255,255,.72);letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.sa-header .timeframe strong{color:var(--terra);font-weight:700;margin-right:4px}
.sa-header .aside{font-size:11.5px;color:rgba(255,255,255,.62);max-width:380px;line-height:1.55;text-align:right}
.sa-header .aside strong{color:#fff}

.series-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.series-tile{background:#fff;border:1px solid var(--border);padding:22px 18px 20px;cursor:pointer;transition:all .18s;position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;min-height:240px}
.series-tile:hover{border-color:var(--navy);transform:translateY(-1px)}
.series-tile.active{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 8px 24px -12px rgba(12,65,96,.45)}
.series-tile .sname{font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--soft-black);margin-bottom:14px;line-height:1.3;min-height:30px;display:flex;align-items:center;justify-content:center}
.series-tile.active .sname{color:#fff}
.series-tile .donut-wrap{position:relative;width:110px;height:110px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}

/* ---- Pricing comparison example ---- */
.pc-wrap{margin-top:44px;padding-top:36px;border-top:1px solid var(--border-strong)}
.pc-head{margin-bottom:22px}
.pc-head .eyebrow{display:block;margin-bottom:12px}
.pc-head h3{font-size:24px;color:var(--soft-black);letter-spacing:-.015em;margin-bottom:10px;font-weight:800}
.pc-head p{font-size:13.5px;line-height:1.6;color:var(--text-muted);max-width:880px}
.pc-head p strong{color:var(--navy);font-weight:700}

.pc-chart{background:#fff;border:1px solid var(--border);padding:36px 40px 30px;margin-bottom:26px}
.pc-chart-hd{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:22px;border-bottom:1px solid var(--rule);margin-bottom:28px;gap:20px;flex-wrap:wrap}
.pc-chart-hd h4{font-size:14px;color:var(--navy);letter-spacing:.04em;font-weight:700}
.pc-chart-hd .pc-note{font-size:11px;color:var(--text-muted);letter-spacing:.04em}
.pc-chart-hd .pc-note strong{color:var(--terra);font-weight:700}

.pc-bars{display:flex;flex-direction:column;gap:28px}
.pc-bar-row{display:grid;grid-template-columns:220px minmax(0,1fr) 120px;gap:18px;align-items:center}
.pc-bar-label{display:flex;flex-direction:column;gap:4px}
.pc-bar-label .who{font-size:10px;letter-spacing:.2em;color:var(--slate);font-weight:700;text-transform:uppercase}
.pc-bar-label .who.terra{color:var(--terra)}
.pc-bar-label .who.navy{color:var(--navy)}
.pc-bar-label .nm{font-size:14px;color:var(--soft-black);font-weight:700;line-height:1.3}
.pc-bar-track{position:relative;height:44px;background:var(--bg-subtle);border:1px solid var(--rule);display:flex;overflow:hidden}
.pc-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;letter-spacing:.02em;font-variant-numeric:tabular-nums;position:relative;border-right:1px solid rgba(255,255,255,.18)}
.pc-seg:last-child{border-right:0}
.pc-seg.trade{background:#8a939b}
.pc-seg.strat{background:#b88560}
.pc-seg.mgr{background:#3a5f78}
.pc-seg.exp{background:#0C4160}
.pc-seg .seg-label{font-size:11px;font-weight:700;color:#fff;letter-spacing:.02em;white-space:nowrap;padding:0 4px}
.pc-seg .seg-label-narrow{display:none}
.pc-seg[data-narrow="1"] .seg-label{display:none}
.pc-seg[data-narrow="1"] .seg-label-narrow{display:inline}
.pc-bar-total{text-align:right;font-family:inherit}
.pc-bar-total .v{font-size:28px;font-weight:900;color:var(--soft-black);letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
.pc-bar-total .v.navy{color:var(--navy)}
.pc-bar-total .l{font-size:10px;color:var(--text-muted);letter-spacing:.12em;font-weight:600;text-transform:uppercase;margin-top:3px}

.pc-delta-callout{background:var(--bg-panel);border-left:3px solid var(--terra);padding:16px 22px;margin-top:24px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
.pc-delta-callout .dc-label{font-size:11px;letter-spacing:.18em;color:var(--terra);font-weight:700;text-transform:uppercase}
.pc-delta-callout .dc-value{font-size:20px;font-weight:800;color:var(--soft-black);letter-spacing:-.015em}
.pc-delta-callout .dc-value strong{color:var(--terra)}
.pc-delta-callout .dc-text{font-size:12.5px;color:var(--text);line-height:1.55;flex:1;min-width:280px}
.pc-delta-callout .dc-text strong{color:var(--navy);font-weight:700}

.pc-legend{display:flex;gap:22px;flex-wrap:wrap;padding-top:22px;margin-top:4px;border-top:1px solid var(--rule);font-size:11.5px;color:var(--text-muted)}
.pc-legend .lg-item{display:flex;align-items:center;gap:8px}
.pc-legend .lg-dot{width:10px;height:10px;display:inline-block}

.pc-cards{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:4px}
.pc-card{background:#fff;border:1px solid var(--border);padding:26px 30px 28px;position:relative}
.pc-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.pc-card.current::before{background:#93513b}
.pc-card.modelist::before{background:var(--navy)}
.pc-card .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;padding-bottom:14px;border-bottom:1px solid var(--rule);gap:14px;flex-wrap:wrap}
.pc-card .hd .tag{font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-weight:700}
.pc-card.current .hd .tag{color:#93513b}
.pc-card.modelist .hd .tag{color:var(--navy)}
.pc-card .hd .tot{font-size:14px;font-weight:700;color:var(--soft-black);font-variant-numeric:tabular-nums}
.pc-card h5{font-size:14.5px;color:var(--soft-black);font-weight:700;letter-spacing:-.01em;margin-bottom:12px;line-height:1.35}
.pc-card .fee-rows{list-style:none;margin:0 0 18px;padding:0}
.pc-card .fee-rows li{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--rule);font-size:12.5px;font-variant-numeric:tabular-nums}
.pc-card .fee-rows li:last-child{border-bottom:0}
.pc-card .fee-rows li span.k{color:var(--text);font-weight:500}
.pc-card .fee-rows li span.v{color:var(--soft-black);font-weight:700}
.pc-card .attr-label{font-size:10px;letter-spacing:.14em;color:var(--slate);font-weight:700;text-transform:uppercase;margin-bottom:10px;padding-top:10px;border-top:1px solid var(--rule)}
.pc-card .attr-list{list-style:none;margin:0;padding:0}
.pc-card .attr-list li{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;line-height:1.5;color:var(--text);padding:6px 0}
.pc-card .attr-list li .mark{flex-shrink:0;font-size:13px;font-weight:800;width:16px;text-align:center;margin-top:0px}
.pc-card.current .attr-list li .mark{color:#93513b}
.pc-card.modelist .attr-list li .mark{color:var(--navy)}
.pc-card .attr-list li span.txt{flex:1}

@media (max-width:1100px){
  .opt-grid{grid-template-columns:1fr 1fr !important}
  .pc-cards{grid-template-columns:1fr !important}
  .pc-bar-row{grid-template-columns:1fr !important}
  .pc-bar-total{text-align:left}
}

/* ---- Team ---- */
.team-featured{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-bottom:32px}
.t-card{background:#fff;border:1px solid var(--border);padding:0;overflow:hidden;transition:border-color .18s;display:flex;flex-direction:column}
.t-card:hover{border-color:var(--navy)}
.t-photo{width:100%;aspect-ratio:1/1;background:#1A1A1A;display:block;overflow:hidden;position:relative}
.t-photo img{width:100%;height:100%;display:block;object-fit:cover}
.t-body{padding:22px 24px 26px;display:flex;flex-direction:column;flex:1}
.t-name{font-size:19px;font-weight:800;color:var(--soft-black);letter-spacing:-.015em;margin-bottom:2px}
.t-cred{font-size:11px;color:var(--terra);font-weight:600;letter-spacing:.06em;margin-bottom:8px}
.t-role{font-size:12px;color:var(--slate);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:14px}
.t-bio{font-size:12.5px;color:var(--text-muted);line-height:1.6;margin-bottom:12px;flex:1}
.t-bullets{list-style:none;font-size:11.5px;color:var(--text);padding-top:10px;border-top:1px solid var(--rule);margin-top:auto}
.t-bullets li{padding:3px 0;line-height:1.5}
.t-bullets li::before{content:"· ";color:var(--slate);font-weight:600}
.t-edu{margin-top:12px;padding-top:10px;border-top:1px solid var(--rule);font-size:11px;color:var(--slate);line-height:1.5;letter-spacing:.02em}

.team-support{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:10px}
.ts-card{background:var(--bg-panel);border:1px solid var(--border);padding:20px 22px;transition:border-color .18s}
.ts-card:hover{border-color:var(--navy)}
.ts-name{font-size:14.5px;font-weight:800;color:var(--soft-black);letter-spacing:-.01em;margin-bottom:4px}
.ts-role{font-size:10.5px;color:var(--slate);letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:10px;line-height:1.35}
.ts-note{font-size:11.5px;color:var(--text-muted);line-height:1.5}

/* ---- Disclosures ---- */
.discl-panel{background:#fff;padding:40px 44px;border:1px solid var(--border);max-width:980px}
.discl-panel h4{font-size:12px;margin:28px 0 12px;color:var(--soft-black);text-transform:uppercase;letter-spacing:.14em;font-weight:700;padding-top:18px;border-top:1px solid var(--rule)}
.discl-panel h4:first-child{margin-top:0;padding-top:0;border-top:0}
.discl-panel h5{font-size:11px;margin:14px 0 6px;color:var(--soft-black);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.discl-panel p{margin-bottom:10px;font-size:12px;line-height:1.65;color:var(--text)}
.discl-panel strong{color:var(--soft-black);font-weight:700}
.discl-panel .caps-block{background:var(--bg-subtle);border-left:3px solid var(--terra);padding:14px 18px;margin:10px 0 14px;font-size:11.5px;line-height:1.6;color:var(--soft-black);font-weight:600;letter-spacing:.01em;text-transform:uppercase}
.discl-panel .caps-block strong{font-weight:800}
.discl-panel .ic-table{width:100%;border-collapse:collapse;margin:10px 0 16px;font-size:11.5px}
.discl-panel .ic-table th{text-align:left;padding:8px 12px;background:var(--navy);color:#fff;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700}
.discl-panel .ic-table td{padding:7px 12px;border-bottom:1px solid var(--rule);color:var(--text)}
.discl-panel .ic-table tr:nth-child(even) td{background:var(--bg-subtle)}
.discl-panel .ic-table td:first-child{font-weight:600;color:var(--soft-black);width:34%}
.discl-panel .defs-list{margin:8px 0 0}
.discl-panel .defs-list li{font-size:12px;line-height:1.7;color:var(--text);margin-bottom:8px;list-style:none;padding-left:0}
.discl-panel .defs-list li strong{display:inline-block;min-width:0;margin-right:6px}
.discl-panel .risk-list li{font-size:12px;line-height:1.65;color:var(--text);margin-bottom:10px;list-style:none;padding-left:0}
.discl-panel .risk-list li strong{color:var(--soft-black);font-weight:700}

/* ---- Tooltip ---- */
.tt{position:absolute;background:var(--soft-black);color:#fff;padding:8px 12px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:1000;white-space:nowrap;font-variant-numeric:tabular-nums;box-shadow:0 6px 20px rgba(0,0,0,.15)}
.tt.show{opacity:1}

/* Responsive */
@media (max-width:1100px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;padding:24px}
  .section{padding:48px 32px}
  .hero{grid-template-columns:1fr}
  .hero-right-col{position:relative;top:0}
  .hero-right{min-height:0}
  .edges-grid,.pillar-grid,.cat-grid,.opt-grid,.pies-row,.pricing-row,.team-featured,.ex-strat-grid,.strat-lead{grid-template-columns:1fr}
  .stepper,.series-grid{grid-template-columns:repeat(2,1fr)}
  .series-kpi-row,.kpi-row{grid-template-columns:repeat(3,1fr)}
  .team-support{grid-template-columns:repeat(2,1fr)}
  .flow-grid{grid-template-columns:1fr;gap:12px}
  .flow-connector{padding:8px 0;flex-direction:row;gap:14px;flex-wrap:wrap;justify-content:center}
  .flow-connector .conn-svg{width:40px;transform:rotate(90deg)}
  .flow-connector .conn-note{max-width:none}
}

function goTo(id){
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.target === id));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === id));
  window.scrollTo({top:0, behavior:'smooth'});
}

function initProcessFlow(){
  // Stage 01: top SAM3 strategies by weight
  const strats = DATA.strategyWeights
    .filter(w => w.SAM3 > 0)
    .sort((a,b) => b.SAM3 - a.SAM3);
  const topStrats = strats.slice(0, 5);
  const remainingStrats = strats.length - topStrats.length;
  document.getElementById('flow-strategies').innerHTML =
    topStrats.map(s => `<li><span title="${s.name}">${s.name}</span><em>${s.SAM3.toFixed(1)}%</em></li>`).join('') +
    (remainingStrats > 0 ? `<li class="more">${remainingStrats} more strategies blended in</li>` : '');

  // Stage 02: asset class rollup from SAM3 holdings (the Design Index exposure)
  const acMap = {};
  DATA.sam3Holdings.forEach(h => {
    if(!h.ac) return;
    acMap[h.ac] = (acMap[h.ac] || 0) + (h.wt || 0);
  });
  const ac = Object.entries(acMap).sort(([,a],[,b]) => b - a);
  const topAC = ac.slice(0, 5);
  const remainingAC = ac.length - topAC.length;
  document.getElementById('flow-index').innerHTML =
    topAC.map(([name, wt]) => `<li><span title="${name}">${name}</span><em>${wt.toFixed(1)}%</em></li>`).join('') +
    (remainingAC > 0 ? `<li class="more">${remainingAC} more asset classes in full index</li>` : '');

  // Stage 03: top SAM3 holdings by weight
  const holdings = [...DATA.sam3Holdings].sort((a,b) => (b.wt||0) - (a.wt||0));
  const topHoldings = holdings.slice(0, 5);
  const remainingHoldings = holdings.length - topHoldings.length;
  document.getElementById('flow-portfolio').innerHTML =
    topHoldings.map(h => `<li><span title="${h.name}">${h.ticker}</span><em>${h.wt.toFixed(1)}%</em></li>`).join('') +
    (remainingHoldings > 0 ? `<li class="more">${remainingHoldings} more holdings in full portfolio</li>` : '');
}

// Build a donut SVG: equity/fi/alt. r=outer, ri=inner.
// Navy for Equity, warm brown for Fixed Income, forest for Alternative.
function makeDonut(eq, fi, alt){
  const R = 50, Ri = 34;
  const total = eq + fi + alt;
  const segments = [
    {v: eq, color: '#0C4160'},
    {v: fi, color: '#8f6f55'},
    {v: alt, color: '#3D6B5E'}
  ];
  let cursor = -Math.PI / 2; // start at 12 o'clock
  const paths = segments.filter(s => s.v > 0).map(s => {
    const angle = (s.v / total) * 2 * Math.PI;
    const x1 = R * Math.cos(cursor), y1 = R * Math.sin(cursor);
    const xi1 = Ri * Math.cos(cursor), yi1 = Ri * Math.sin(cursor);
    cursor += angle;
    const x2 = R * Math.cos(cursor), y2 = R * Math.sin(cursor);
    const xi2 = Ri * Math.cos(cursor), yi2 = Ri * Math.sin(cursor);
    const large = angle > Math.PI ? 1 : 0;
    return `<path d="M ${x1.toFixed(2)},${y1.toFixed(2)} A ${R},${R} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)} L ${xi2.toFixed(2)},${yi2.toFixed(2)} A ${Ri},${Ri} 0 ${large} 0 ${xi1.toFixed(2)},${yi1.toFixed(2)} Z" fill="${s.color}" stroke="#fff" stroke-width=".5"/>`;
  }).join('');
  return paths;
}

function drawModelsChart(key){
  const bkey = {SAM1:'B25',SAM2:'B40',SAM3:'B60',SAM4:'B75',SAM5:'B90'}[key];
  const series = DATA.backtest;
  const W = 960, H = 360, pad = {t:16,r:66,b:36,l:72};
  const modelVals = series.map(d => d[key]);
  const benchVals = series.map(d => d[bkey]);
  const maxY = Math.max(...modelVals, ...benchVals);
  const minY = 900;
  const xScale = i => pad.l + (W - pad.l - pad.r) * (i / (series.length-1));
  const yScale = v => pad.t + (H - pad.t - pad.b) * (1 - (v - minY) / (maxY - minY));
  const pathFor = arr => arr.map((v,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScale(v).toFixed(1)}`).join('');
  const areaFor = arr => `M${xScale(0).toFixed(1)},${yScale(minY).toFixed(1)} ` +
    arr.map((v,i) => `L${xScale(i).toFixed(1)},${yScale(v).toFixed(1)}`).join('') +
    ` L${xScale(series.length-1).toFixed(1)},${yScale(minY).toFixed(1)} Z`;

  const allTicks = [1000,2000,3000,4000,5000,6000,7000,8000,9000];
  const yTicks = allTicks.filter(v => v <= maxY && v >= minY);
  const yearMap = new Map();
  series.forEach((d,i) => { const y = d.d.slice(0,4); if(!yearMap.has(y)) yearMap.set(y, i); });
  const xYears = [...yearMap.entries()].filter((_,idx) => idx % 3 === 0);

  const chart = document.getElementById('series-chart');
  const mName = DATA.modelsSummary.find(m=>m.key===key).name;
  chart.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="modelGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#0C4160" stop-opacity=".2"/>
          <stop offset="100%" stop-color="#0C4160" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${yTicks.map(v => `
        <line x1="${pad.l}" x2="${W-pad.r}" y1="${yScale(v)}" y2="${yScale(v)}" stroke="#EDEBE6" stroke-width="1"/>
        <text x="${pad.l-10}" y="${yScale(v)+4}" text-anchor="end" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">$${v.toLocaleString()}</text>
      `).join('')}
      ${xYears.map(([y,i]) => `
        <text x="${xScale(i)}" y="${H-pad.b+20}" text-anchor="middle" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">${y}</text>
      `).join('')}

// ============ Rolling 12-Month Return Analysis ============
function drawRollingChart(){
  const key='SAM3', bkey='B60';
  const series = DATA.backtest;
  const mNavs = series.map(d => d[key]);
  const bNavs = series.map(d => d[bkey]);
  const n = series.length;
  const rolling = [];
  for(let i = 12; i < n; i++){
    const m = (mNavs[i]/mNavs[i-12] - 1) * 100;
    const b = (bNavs[i]/bNavs[i-12] - 1) * 100;
    rolling.push({d: series[i].d, m, b, xs: m - b, srcIdx: i});
  }

  const W = 960, Htop = 260, Hbot = 150, gap = 20, H = Htop + gap + Hbot;
  const pad = {l:60, r:56, t:16, b:24};

  const topMax = Math.max(...rolling.map(r => Math.max(r.m, r.b))) * 1.05;
  const topMin = Math.min(...rolling.map(r => Math.min(r.m, r.b))) * 1.05;
  const topRange = topMax - topMin;
  const xScale = i => pad.l + (W - pad.l - pad.r) * (i / (rolling.length - 1));
  const yScaleTop = v => pad.t + (Htop - pad.t - pad.b) * (1 - (v - topMin) / topRange);
  const pathTop = (fn) => rolling.map((r,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScaleTop(fn(r)).toFixed(1)}`).join('');

  const topStep = topRange > 40 ? 10 : (topRange > 20 ? 5 : 2);
  const topTicks = [];
  for(let v = Math.ceil(topMin/topStep)*topStep; v <= topMax; v += topStep){ topTicks.push(v); }

  const botY0 = Htop + gap;
  const xsMax = Math.max(...rolling.map(r => r.xs), 2) * 1.1;
  const xsMin = Math.min(...rolling.map(r => r.xs), -2) * 1.1;
  const xsRange = xsMax - xsMin;
  const yScaleBot = v => botY0 + pad.t + (Hbot - pad.t - pad.b) * (1 - (v - xsMin) / xsRange);

  const zeroYBot = yScaleBot(0);
  const areaPath = `M${xScale(0).toFixed(1)},${zeroYBot.toFixed(1)} ` +
    rolling.map((r,i) => `L${xScale(i).toFixed(1)},${yScaleBot(r.xs).toFixed(1)}`).join('') +
    ` L${xScale(rolling.length-1).toFixed(1)},${zeroYBot.toFixed(1)} Z`;

  const botStep = xsRange > 20 ? 5 : (xsRange > 10 ? 2 : 1);
  const botTicks = [];
  for(let v = Math.ceil(xsMin/botStep)*botStep; v <= xsMax; v += botStep){ botTicks.push(v); }

  const yearTicks = xYearTicks(rolling, 3);
  const latest = rolling[rolling.length-1];

  document.getElementById('ex-rolling-chart').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="xsPosGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#B4654A" stop-opacity=".55"/>
          <stop offset="100%" stop-color="#B4654A" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${topTicks.map(v => `
        <line x1="${pad.l}" x2="${W-pad.r}" y1="${yScaleTop(v).toFixed(1)}" y2="${yScaleTop(v).toFixed(1)}" stroke="${v===0?'#C8C5BD':'#EDEBE6'}" stroke-width="${v===0?1:0.6}"/>
        <text x="${pad.l-8}" y="${(yScaleTop(v)+3).toFixed(1)}" text-anchor="end" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">${v}%</text>
      `).join('')}
      <path d="${pathTop(r=>r.b)}" fill="none" stroke="#68869A" stroke-width="1.3" stroke-dasharray="4 3" opacity=".85"/>
      <path d="${pathTop(r=>r.m)}" fill="none" stroke="#0C4160" stroke-width="1.8"/>
      <text x="${(W-pad.r+5)}" y="${(yScaleTop(latest.m)+4).toFixed(1)}" font-size="10" fill="#0C4160" font-weight="700" font-variant-numeric="tabular-nums">${latest.m.toFixed(1)}%</text>
      <text x="${(W-pad.r+5)}" y="${(yScaleTop(latest.b)+4).toFixed(1)}" font-size="10" fill="#68869A" font-weight="600" font-variant-numeric="tabular-nums">${latest.b.toFixed(1)}%</text>
      <text x="${pad.l}" y="${(pad.t-2).toFixed(1)}" font-size="10" fill="#8a939b" letter-spacing="1.5" font-weight="600" style="text-transform:uppercase;">Rolling 1Y Total Return</text>
      ${botTicks.map(v => `
        <line x1="${pad.l}" x2="${W-pad.r}" y1="${yScaleBot(v).toFixed(1)}" y2="${yScaleBot(v).toFixed(1)}" stroke="${v===0?'#C8C5BD':'#EDEBE6'}" stroke-width="${v===0?1:0.6}"/>
        <text x="${pad.l-8}" y="${(yScaleBot(v)+3).toFixed(1)}" text-anchor="end" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">${v}%</text>
      `).join('')}
      <path d="${areaPath}" fill="url(#xsPosGrad)"/>
      <path d="${rolling.map((r,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScaleBot(r.xs).toFixed(1)}`).join('')}" fill="none" stroke="#B4654A" stroke-width="1.4"/>
      <text x="${(W-pad.r+5)}" y="${(yScaleBot(latest.xs)+4).toFixed(1)}" font-size="10" fill="#B4654A" font-weight="700" font-variant-numeric="tabular-nums">${latest.xs>=0?'+':''}${latest.xs.toFixed(1)}%</text>
      <text x="${pad.l}" y="${(botY0+pad.t-2).toFixed(1)}" font-size="10" fill="#8a939b" letter-spacing="1.5" font-weight="600" style="text-transform:uppercase;">Rolling 1Y Excess Return (Model − Benchmark)</text>
      ${yearTicks.map(([y,i]) => `<text x="${xScale(i).toFixed(1)}" y="${(H-4).toFixed(1)}" text-anchor="middle" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">${y}</text>`).join('')}
    </svg>`;
}

// ============ Rolling 12-Month Annualized Std Dev ============
function drawStdevChart(){
  const key='SAM3', bkey='B60';
  const series = DATA.backtest;
  const mNavs = series.map(d => d[key]);
  const bNavs = series.map(d => d[bkey]);
  const n = series.length;

  const mRets = [], bRets = [];
  for(let i = 1; i < n; i++){
    mRets.push((mNavs[i]/mNavs[i-1] - 1) * 100);
    bRets.push((bNavs[i]/bNavs[i-1] - 1) * 100);
  }

  const SQRT12 = Math.sqrt(12);
  const pts = [];
  for(let k = 11; k < mRets.length; k++){
    const mS = mRets.slice(k - 11, k + 1);
    const bS = bRets.slice(k - 11, k + 1);
    const mM = mS.reduce((s,v)=>s+v,0) / 12;
    const bM = bS.reduce((s,v)=>s+v,0) / 12;
    const mV = mS.reduce((s,v)=>s+(v-mM)**2,0) / 11;
    const bV = bS.reduce((s,v)=>s+(v-bM)**2,0) / 11;
    const mA = Math.sqrt(mV) * SQRT12;
    const bA = Math.sqrt(bV) * SQRT12;
    pts.push({d: series[k+1].d, m: mA, b: bA, delta: mA - bA});
  }

  const W = 960, Htop = 260, Hbot = 150, gap = 20, H = Htop + gap + Hbot;
  const pad = {l:60, r:56, t:16, b:24};

  const topMax = Math.max(...pts.map(p => Math.max(p.m, p.b))) * 1.08;
  const topMin = 0;
  const topRange = topMax - topMin;
  const xScale = i => pad.l + (W - pad.l - pad.r) * (i / (pts.length - 1));
  const yScaleTop = v => pad.t + (Htop - pad.t - pad.b) * (1 - (v - topMin) / topRange);
  const pathTop = (fn) => pts.map((p,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScaleTop(fn(p)).toFixed(1)}`).join('');

  const topStep = topRange > 20 ? 5 : (topRange > 10 ? 2 : 1);
  const topTicks = [];
  for(let v = 0; v <= topMax; v += topStep){ topTicks.push(v); }

  const botY0 = Htop + gap;
  const deltaMax = Math.max(...pts.map(p => p.delta), 1) * 1.15;
  const deltaMin = Math.min(...pts.map(p => p.delta), -1) * 1.15;
  const deltaRange = deltaMax - deltaMin;
  const yScaleBot = v => botY0 + pad.t + (Hbot - pad.t - pad.b) * (1 - (v - deltaMin) / deltaRange);

  const zeroYBot = yScaleBot(0);
  const areaPath = `M${xScale(0).toFixed(1)},${zeroYBot.toFixed(1)} ` +
    pts.map((p,i) => `L${xScale(i).toFixed(1)},${yScaleBot(p.delta).toFixed(1)}`).join('') +
    ` L${xScale(pts.length-1).toFixed(1)},${zeroYBot.toFixed(1)} Z`;

  const botStep = deltaRange > 10 ? 2 : 1;
  const botTicks = [];
  for(let v = Math.ceil(deltaMin/botStep)*botStep; v <= deltaMax; v += botStep){ botTicks.push(v); }

  const yearTicks = xYearTicks(pts, 3);
  const latest = pts[pts.length-1];

  document.getElementById('ex-stdev-chart').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="stdevDeltaGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#B4654A" stop-opacity=".55"/>
          <stop offset="100%" stop-color="#B4654A" stop-opacity="0"/>
        </linearGradient>
      </defs>

// ============ Market Regime Analysis · Up / Down Capture ============
function detectRegimes(navs, threshold){
  const regimes = [];
  let mode = 'bull';
  let startIdx = 0;
  let peak = navs[0], peakIdx = 0;
  let trough = navs[0], troughIdx = 0;

  for(let i = 1; i < navs.length; i++){
    const v = navs[i];
    if(mode === 'bull'){
      if(v > peak){ peak = v; peakIdx = i; }
      const dd = (v - peak) / peak;
      if(dd <= -threshold){
        regimes.push({type:'bull', startIdx, endIdx: peakIdx});
        mode = 'bear';
        startIdx = peakIdx;
        trough = v;
        troughIdx = i;
      }
    } else {
      if(v < trough){ trough = v; troughIdx = i; }
      if(v >= peak){
        regimes.push({type:'bear', startIdx, endIdx: troughIdx});
        mode = 'bull';
        startIdx = troughIdx;
        peak = v;
        peakIdx = i;
      }
    }
  }
  regimes.push({type: mode, startIdx, endIdx: navs.length - 1, open: true});
  return regimes;
}

function drawRegimeAnalysis(){
  const key='SAM3', bkey='B60';
  const series = DATA.backtest;
  const bNavs = series.map(d => d[bkey]);
  const mNavs = series.map(d => d[key]);

  const regimes = detectRegimes(bNavs, 0.10);

  const W = 960, H = 120;
  const pad = {l:0, r:0, t:20, b:24};
  const n = series.length;
  const xScale = i => pad.l + (W - pad.l - pad.r) * (i / (n - 1));

  const bands = regimes.map(r => {
    const x1 = xScale(r.startIdx);
    const x2 = xScale(r.endIdx);
    const fill = r.type === 'bull' ? 'rgba(12,65,96,.22)' : 'rgba(180,101,74,.25)';
    return `<rect x="${x1.toFixed(1)}" y="${pad.t}" width="${Math.max(1,(x2-x1)).toFixed(1)}" height="${(H-pad.t-pad.b)}" fill="${fill}"/>`;
  }).join('');

  const pnavMax = Math.max(...bNavs);
  const pnavMin = Math.min(...bNavs);
  const yBench = v => pad.t + (H - pad.t - pad.b) * (1 - (v - pnavMin)/(pnavMax - pnavMin)) * 0.9 + 4;
  const benchPath = bNavs.map((v,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yBench(v).toFixed(1)}`).join('');

  const yearTicks = xYearTicks(series, 3);

  document.getElementById('ex-regime-timeline').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      ${bands}
      <path d="${benchPath}" fill="none" stroke="#1A1A1A" stroke-width="1.1" opacity=".65"/>
      <text x="${pad.l+2}" y="${14}" font-size="10" fill="#8a939b" letter-spacing="1.4" font-weight="600" style="text-transform:uppercase;">Benchmark Path With Regime Overlay</text>
      ${yearTicks.map(([y,i]) => `<text x="${xScale(i).toFixed(1)}" y="${(H-6).toFixed(1)}" text-anchor="middle" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">${y}</text>`).join('')}
    </svg>`;

  const t = document.getElementById('ex-regime-table');
  const rows = regimes.map(r => {
    const start = series[r.startIdx].d;
    const end = series[r.endIdx].d;
    const months = r.endIdx - r.startIdx;
    const mRet = (mNavs[r.endIdx] / mNavs[r.startIdx] - 1) * 100;
    const bRet = (bNavs[r.endIdx] / bNavs[r.startIdx] - 1) * 100;
    let capture = null;
    let captureLabel = '';
    if(r.type === 'bull'){
      if(bRet > 0) capture = (mRet / bRet) * 100;
      captureLabel = 'Up Capture';
    } else {
      if(bRet < 0) capture = (mRet / bRet) * 100;
      captureLabel = 'Down Capture';
    }
    return {r, start, end, months, mRet, bRet, capture, captureLabel};
  });

  const html = `
    <thead>
      <tr>
        <th>Regime</th>
        <th>Period</th>
        <th>Months</th>
        <th>Benchmark</th>
        <th>Model</th>
        <th>Δ</th>
        <th>Capture Ratio</th>
      </tr>
    </thead>
    <tbody>
      ${rows.map(row => {
        const {r, start, end, months, mRet, bRet, capture, captureLabel} = row;
        const pillClass = r.type === 'bull' ? 'bull' : 'bear';
        const pillLabel = r.type === 'bull' ? (r.open ? 'Bull (current)' : 'Bull') : (r.open ? 'Bear (current)' : 'Bear');
        const delta = mRet - bRet;
        let captureHtml = '–';
        let captureClass = 'capture-neutral';
        if(capture !== null){
          const isGood = (r.type==='bull' && capture > 100) || (r.type==='bear' && capture < 100);
          captureClass = isGood ? 'capture-good' : 'capture-bad';
          captureHtml = `${capture.toFixed(0)}% <span style="font-weight:500;color:var(--text-muted);font-size:10.5px;letter-spacing:.06em;">${captureLabel}</span>`;
        } else {
          captureHtml = `<span style="color:var(--text-muted);font-size:11px;">mixed sign</span>`;
        }
        return `
          <tr>
            <td><span class="regime-pill ${pillClass}">${pillLabel}</span></td>
            <td style="color:var(--text-muted);font-size:12px;">${formatDateShort(start)} – ${formatDateShort(end)}</td>
            <td>${months}</td>
            <td>${bRet>=0?'+':''}${bRet.toFixed(1)}%</td>
            <td>${mRet>=0?'+':''}${mRet.toFixed(1)}%</td>
            <td>${delta>=0?'+':''}${delta.toFixed(1)}%</td>
            <td class="${captureClass}">${captureHtml}</td>
          </tr>`;
      }).join('')}
    </tbody>`;
  t.innerHTML = html;
}

// ---------- Donuts (asset class + category) ----------
function drawDonut(svgId, legendId, data){
  const total = data.reduce((a,b) => a + b.value, 0);
  const svg = document.getElementById(svgId);
  const legend = document.getElementById(legendId);
  let cursor = -Math.PI/2;
  const R = 90, Ri = 56;
  const paths = data.map(d => {
    const angle = (d.value/total) * 2 * Math.PI;
    const x1 = R*Math.cos(cursor), y1 = R*Math.sin(cursor);
    const xi1 = Ri*Math.cos(cursor), yi1 = Ri*Math.sin(cursor);
    cursor += angle;
    const x2 = R*Math.cos(cursor), y2 = R*Math.sin(cursor);
    const xi2 = Ri*Math.cos(cursor), yi2 = Ri*Math.sin(cursor);
    const large = angle > Math.PI ? 1 : 0;
    return `<path d="M ${x1.toFixed(2)},${y1.toFixed(2)} A ${R},${R} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)} L ${xi2.toFixed(2)},${yi2.toFixed(2)} A ${Ri},${Ri} 0 ${large} 0 ${xi1.toFixed(2)},${yi1.toFixed(2)} Z" fill="${d.color}" stroke="#fff" stroke-width=".6"><title>${d.name}: ${d.value.toFixed(1)}%</title></path>`;
  }).join('');
  svg.innerHTML = paths;
  legend.innerHTML = data.map(d =>
    `<div class="row"><span class="sw" style="background:${d.color};"></span><span class="nm">${d.name}</span><span class="wt">${d.value.toFixed(1)}%</span></div>`
  ).join('');
}

function drawDonutByAssetClass(){
  const ac = {};
  const acCat = {};
  DATA.sam3Holdings.forEach(h => {
    if(!h.ac) return;
    ac[h.ac] = (ac[h.ac] || 0) + (h.wt || 0);
    if(!acCat[h.ac]) acCat[h.ac] = h.cat;
  });
  // Keep a stable order: group by category (Equity, Fixed Income, Alternative), descending weight within each
  const order = ['Equity','Fixed Income','Alternative'];
  const entries = [];
  order.forEach(catName => {
    Object.entries(ac)
      .filter(([name]) => acCat[name] === catName)
      .sort(([,a],[,b]) => b - a)
      .forEach(([name,value]) => entries.push({name, value, cat: catName}));
  });

  const eqShades = ['#0C4160','#1b5a7f','#2b7095','#3f8aab','#5aa1be','#82b8cb','#a5ced8','#c5dee4'];
  const fiShades = ['#8f6f55','#a58268','#b89884','#c6ad99','#d0bba9','#dcc7b5','#e4d2c1'];
  const altShades = ['#3D6B5E','#58887a','#7ba79a','#9cbfb3'];
  let eqI = 0, fiI = 0, altI = 0;

  const data = entries.map(e => {
    let color;
    if(e.cat === 'Equity') { color = eqShades[eqI % eqShades.length]; eqI++; }
    else if(e.cat === 'Fixed Income') { color = fiShades[fiI % fiShades.length]; fiI++; }
    else { color = altShades[altI % altShades.length]; altI++; }
    return {name: e.name, value: e.value, color};
  });
  drawDonut('pie-ac', 'legend-ac', data);
}

function drawDonutByCategory(){
  const cats = {'Equity':0, 'Fixed Income':0, 'Alternative':0};
  DATA.sam3Holdings.forEach(h => { cats[h.cat] = (cats[h.cat]||0) + (h.wt||0); });
  const colorMap = {'Equity':'#0C4160','Fixed Income':'#8f6f55','Alternative':'#3D6B5E'};
  const data = Object.entries(cats)
    .filter(([,v]) => v > 0)
    .map(([k,v]) => ({name:k, value:v, color:colorMap[k]}));

}

function drawAnnualReturns(){
  const ar = DATA.annualReturns;
  const years = ar.years;
  // Order: YTD first if present, then newest to oldest numeric years
  const ordered = [];
  if(years.includes('YTD')) ordered.push('YTD');
  const numeric = years.filter(y => y !== 'YTD').sort((a,b) => {
    const na = parseInt(String(a).replace('*',''), 10);
    const nb = parseInt(String(b).replace('*',''), 10);
    return nb - na;
  });
  ordered.push(...numeric);

  const rows = ordered.map(y => {
    const i = years.indexOf(y);
    return {year: y === 'YTD' ? 'YTD 2026*' : y, m: ar.SAM3[i], b: ar.SAM3_B[i]};
  });

  // With ~27 rows, render 3 year-pairs across (9 or 10 rows deep)
  let html = `<thead><tr>
      <th>Year</th><th>Model</th><th>Bench</th><th>Δ</th>
      <th>Year</th><th>Model</th><th>Bench</th><th>Δ</th>
      <th>Year</th><th>Model</th><th>Bench</th><th>Δ</th>
    </tr></thead><tbody>`;
  const third = Math.ceil(rows.length / 3);
  const makeCell = (k) => {
    if(k >= rows.length) return '<td></td><td></td><td></td><td></td>';
    const r = rows[k];
    const delta = r.m - r.b;
    const dc = delta >= 0 ? 'delta-pos' : 'delta-neg';
    return `<td>${r.year}</td><td>${r.m.toFixed(2)}%</td><td>${r.b.toFixed(2)}%</td><td class="${dc}">${delta>=0?'+':''}${delta.toFixed(2)}%</td>`;
  };
  for(let i = 0; i < third; i++){
    html += `<tr>${makeCell(i)}${makeCell(i + third)}${makeCell(i + 2*third)}</tr>`;
  }
  html += '</tbody>';
  document.getElementById('ar-table').innerHTML = html;
}

        <li><strong>International / Emerging Market Equities.</strong> Investing in international securities involves special additional risks. These risks include, but are not limited to, currency risk, political risk, and risk associated with varying accounting standards. Investing in emerging markets may accentuate these risks.</li>
        <li><strong>Sector Strategies.</strong> Portfolios that invest exclusively in one sector or industry involve additional risks. The lack of industry diversification subjects the investor to increased industry-specific risks.</li>
        <li><strong>Non-Diversified Strategies.</strong> Portfolios that invest a significant percentage of assets in a single issuer involve additional risks, including share price fluctuations, because of the increased concentration of investments.</li>
        <li><strong>Small Cap Equities.</strong> Portfolios that invest in stocks of small companies involve additional risks. Smaller companies typically have a higher risk of failure and are not as well-established as larger blue-chip companies. Historically, smaller-company stocks have experienced a greater degree of market volatility than the overall market average.</li>
        <li><strong>Mid-Cap Equities.</strong> Portfolios that invest in companies with market capitalization below $10 billion involve additional risks. The securities of these companies may be more volatile and less liquid than the securities of larger companies.</li>
        <li><strong>High-Yield Bonds.</strong> Portfolios that invest in lower-rated debt securities (commonly referred to as junk bonds) involve additional risks because of the lower credit quality of the securities in the portfolio. The investor should be aware of the possible higher level of volatility and increased risk of default.</li>
        <li><strong>Tax-Free Municipal Bonds.</strong> The investor should note that the income from tax-free municipal bond funds may be subject to state and local taxation and the Alternative Minimum Tax.</li>
        <li><strong>Bonds.</strong> Bonds are subject to interest rate risk. As the prevailing level of bond interest rates rises, the value of bonds already held in a portfolio declines. Portfolios that hold bonds are subject to declines and increases in value due to general changes in interest rates.</li>
        <li><strong>Bank Loan / Senior Debt.</strong> Bank loans and senior loans are impacted by the risks associated with fixed income in general, including interest rate risk and default risk. They are often non-investment grade; therefore, the risk of default is high. These securities are also relatively illiquid. Managed products that invest in bank loans / senior debt are often highly leveraged, producing a high risk of return volatility.</li>
        <li><strong>Short Positions.</strong> When a short position moves unfavorably, the losses are theoretically unlimited. The broker may demand more collateral, and a manager might have to close out a short position at an inopportune time to limit further losses.</li>
        <li><strong>Long-Short.</strong> Due to strategies used by long-short funds, which may include but are not limited to leverage, short selling, short-term trading, and investing in derivatives, these funds may have greater risk, volatility, and expenses than those focusing on traditional investment strategies.</li>
        <li><strong>Liquidity Risk.</strong> Closed-end fund, ETF, and HOLDR trading may be halted due to market conditions, impacting an investor's ability to sell a fund.</li>
        <li><strong>Market Price Risk.</strong> The market price of ETFs, HOLDRs, and closed-end funds traded on the secondary market is subject to the forces of supply and demand and thus independent of the NAV. This can result in the market price trading at a premium or discount to the NAV, which will affect an investor's value.</li>
        <li><strong>Market Risk.</strong> The market price of ETFs and HOLDRs can fluctuate because of several factors, such as security-specific factors or general investor sentiment. Therefore, investors should be aware of the prospect of market fluctuations and the impact it may have on the market price.</li>
        <li><strong>Money Market Funds.</strong> Investments in these funds are not guaranteed by the FDIC or any other government agency. An investor can lose money by investing in these funds. The fund strives to preserve the investment; however, it cannot guarantee to do so.</li>
      </ul>

      <h4>Definitions</h4>
      <ul class="defs-list">
        <li><strong>Alpha:</strong> A measure of an investment's performance compared to a benchmark, indicating the risk-adjusted excess return of the investment relative to the return of the benchmark.</li>
        <li><strong>Annualized Return:</strong> The geometric average amount of money earned by an investment each year over a given time period, expressed as a percentage.</li>
        <li><strong>Beta:</strong> A measure of the volatility, or systematic risk, of an investment compared to the benchmark.</li>
        <li><strong>Information Ratio (Info Ratio):</strong> A risk-adjusted performance measure that is defined as the excess return of an investment divided by the tracking error.</li>
        <li><strong>Maximum Drawdown (MaxDD):</strong> The maximum observed loss from a peak to a trough of an investment, before a new peak is attained, measured as a percentage.</li>
        <li><strong>Rolling Period Over / Under Performance:</strong> The annualized total excess return (if positive) or underperformance (if negative) of an investment compared to its benchmark, evaluated on a monthly basis over the indicated look-back period.</li>
        <li><strong>Sharpe Ratio:</strong> A risk-adjusted measure calculated by dividing the excess return of an investment by its standard deviation, indicating the average return earned in excess of the risk-free rate per unit of volatility.</li>
        <li><strong>Standard Deviation:</strong> A measure of the dispersion of a set of data from its mean, calculated as the square root of variance, indicating the historical volatility of an investment.</li>
        <li><strong>Total Return:</strong> The actual rate of return of an investment over a given period, including both capital appreciation and any dividends or interest payments.</li>
        <li><strong>Tracking Error:</strong> A measure of how closely an investment follows its benchmark, calculated as the standard deviation of the difference between the investment and benchmark returns.</li>
      </ul>
